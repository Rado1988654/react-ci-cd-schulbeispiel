name: CI/CD Pipeline

# Wann soll die Pipeline laufen?
on:
  push:
    branches: [main]      # Bei Push auf main-Branch
  pull_request:
    branches: [main]      # Bei Pull Requests gegen main

# Berechtigungen für GitHub Pages Deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Erlaube nur einen Deployment gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Job 1: Build & Test
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 1. Code auschecken
      - name: Repository auschecken
        uses: actions/checkout@v4

      # 2. Node.js einrichten
      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Dependencies installieren
      - name: Dependencies installieren
        run: npm ci

      # 4. Build erstellen
      - name: Build erstellen
        run: npm run build

      # 5. Tests ausführen
      - name: Tests ausführen
        run: npm test -- --run

      # Build-Artifact für Deploy-Job speichern
      - name: Build-Artifact hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Job 2: Deploy zu GitHub Pages (nur bei Push auf main, nicht bei PR)
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy zu GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4